<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spend On Child</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=6" />
    <link rel="stylesheet" href="./styles.css?v=6" />
  </head>
  <body>
    <header class="masthead">
      <img
        class="masthead__photo"
        src="https://cdn.pixabay.com/photo/2020/04/09/08/06/kid-5020226_1280.jpg"
        alt="Child playing with toys"
      />
      <div class="masthead__content">
        <div class="title-lockup">
          <img class="site-logo" src="./favicon.svg?v=6" alt="" />
          <h1>Spend On Child</h1>
        </div>
      </div>
    </header>

    <section class="sticky-ledger" aria-live="polite">
      <div class="ledger-main">
        <span class="ledger-label" id="ledgerHousehold">Household</span>
        <strong id="remainingMoney">$0</strong>
      </div>
      <div>
        <span class="ledger-label">Covered</span>
        <strong id="coveredCount">0</strong>
      </div>
      <div class="children-panel">
        <span class="ledger-label">Children</span>
        <div class="child-controls">
          <button type="button" id="removeChild" aria-label="Try raising fewer children">-</button>
          <strong id="childCount">1</strong>
          <button type="button" id="addChild" aria-label="Try raising more children">+</button>
        </div>
      </div>
    </section>

    <main>
      <section class="control-band" aria-label="Scenario controls">
        <div class="section-heading">
          <h2>Household</h2>
        </div>
        <div class="persona-grid" id="personaGrid"></div>
      </section>

      <section class="run-section" aria-label="Checkpoint controls">
        <div class="section-heading">
          <h2>Checkpoints</h2>
          <div class="run-actions">
            <button type="button" id="prevYear">Prev</button>
            <button type="button" id="nextYear">Next</button>
          </div>
        </div>
        <div class="year-run">
          <div class="year-card">
            <span>Age</span>
            <strong id="yearNumber">1</strong>
            <p id="yearStage">Baby year</p>
          </div>
          <div class="year-track" id="yearTrack"></div>
          <div class="life-event" id="lifeEvent"></div>
        </div>
      </section>

      <section class="savings-section" aria-label="Savings options">
        <details class="savings-dropdown">
          <summary>
            <span>Savings</span>
          </summary>
          <div class="savings-grid" id="savingsGrid"></div>
        </details>
      </section>

      <section class="shop-section" aria-label="Baby and child costs">
        <div class="shop-heading">
          <div>
            <h2>Shop</h2>
          </div>
          <div class="shop-actions">
            <button type="button" id="autoBuy">Auto Buy</button>
            <button type="button" id="resetGame">Reset</button>
          </div>
        </div>
        <div class="item-grid" id="itemGrid"></div>
      </section>

      <section class="receipt-section" aria-label="Receipt">
        <div class="section-heading">
          <h2>Receipt</h2>
        </div>
        <div class="receipt" id="receipt"></div>
      </section>

      <section class="sources-section" aria-label="Sources and assumptions">
        <div class="section-heading">
          <h2>Starter Data</h2>
        </div>
        <div class="source-list" id="sourceList"></div>
      </section>

      <section class="progress-section" aria-label="Progress report">
        <div class="section-heading">
          <h2 id="progressTitle">Progress Check</h2>
        </div>
        <div class="progress-layout">
          <div class="meter-list" id="meterList"></div>
          <div class="verdict" id="verdict"></div>
        </div>
      </section>
    </main>

    <script src="./script.js?v=6"></script>
  </body>
</html>
